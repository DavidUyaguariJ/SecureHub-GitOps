apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: daviduyaguarij/securehub-backend:dev-13
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: backend-config-dev
                  key: db-host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secrets-dev
                  key: db-user

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets-dev
                  key: db-password

            - name: RSA_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets-dev
                  key: rsa-public-key

            - name: RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets-dev
                  key: rsa-private-key

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"